services:
  aerpaw-sionna-api:
    build:
      context: .
      network: host
      dockerfile: Dockerfile
    container_name: aerpaw-sionna-api
    gpus: all
    cap_add:
      - NET_ADMIN
    volumes:
      - ./src:/app/src
    environment:
      - PYTHONPATH=/app/src
      - SCENE_PATH=/app/scenes/lake-wheeler-scene.xml
    restart: unless-stopped
